# My first CI workflow with environment variables and secrets
# I followed the GitHub Actions docs to figure this out.
# The docs use $GITHUB_ENV for sharing vars across steps, but I wanted to
# understand the built-in env: and secrets: syntax first.

name: CI with env and secrets

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Workflow-level env — available to all jobs unless overridden
env:
  APP_ENV: ci
  LOG_LEVEL: debug

jobs:
  build:
    runs-on: ubuntu-latest

    # Job-level env — available to all steps in this job
    env:
      BUILD_DIR: ./build
      PYTHON_VERSION: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
        # Using env.PYTHON_VERSION from the job-level env block above

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        env:
          # Step-level env overrides job/workflow level for this step only
          PIP_INDEX_URL: ${{ vars.PIP_MIRROR_URL || 'https://pypi.org/simple' }}

      - name: Run tests
        run: python -m pytest tests/ --junitxml=$BUILD_DIR/test-results.xml
        env:
          # Step-level env — only this step sees these
          DB_URL: ${{ secrets.TEST_DB_URL }}
          API_KEY: ${{ secrets.TEST_API_KEY }}
        # Using ${{ secrets.X }} syntax — GitHub masks these in logs

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ${{ env.BUILD_DIR }}/test-results.xml
