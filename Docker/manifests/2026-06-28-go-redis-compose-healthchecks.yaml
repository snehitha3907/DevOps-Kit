# docker-compose.yml — Go HTTP server + Redis with health checks
#
# Builds the Go server from source so you don't need a pre-built image.
# Redis gets persistent storage and both services get health checks so
# compose can wait for real readiness before wiring the app together.
#
# Usage: docker compose up -d
#        curl http://localhost:8080/health

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      REDIS_ADDR: redis:6379
    networks:
      - app-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - redis-data:/data
    restart: unless-stopped

networks:
  app-net:
    driver: bridge

volumes:
  redis-data:
